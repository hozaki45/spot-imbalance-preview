areaSel.value = DATA.profile['tokyo'] ? 'tokyo' : DATA.areas[0].key;
let profChart = null, trendChart = null;
const base = {
  chart:{ type:'line', height:380, foreColor:'#9fb0c8', toolbar:{show:false}, animations:{enabled:false} },
  colors:[C.spot, C.imb, C.diff], stroke:{ width:2, curve:'straight' },
  grid:{ borderColor:'#22304a' }, legend:{ labels:{ colors:'#cbd5e1' } },
  tooltip:{ theme:'dark' }, dataLabels:{ enabled:false },
  yaxis:{ title:{ text:'円/kWh' }, decimalsInFloat:2 }
};
const names = ['スポット','インバランス(不足)','差分(スポット−不足)'];
function render() {
  const a = areaSel.value, dt = dtSel.value;
  const p = DATA.profile[a][dt];
  const pOpts = Object.assign({}, base, {
    series:[ {name:names[0],data:p.spot}, {name:names[1],data:p.imbalance}, {name:names[2],data:p.diff} ],
    xaxis:{ categories:DATA.koma_labels, tickAmount:12, title:{text:'時間帯（30分コマ 開始時刻）'} }
  });
  if (profChart) profChart.destroy();
  profChart = new ApexCharts(document.getElementById('profileChart'), pOpts); profChart.render();

  const t = DATA.timeseries[a];
  let idx = t.dates.map((_, i) => i);
  if (dt !== 'all') idx = idx.filter(i => t.day_type[i] === dt);
  const pick = arr => idx.map(i => arr[i]);
  const tOpts = Object.assign({}, base, {
    series:[ {name:names[0],data:pick(t.spot)}, {name:names[1],data:pick(t.imbalance)}, {name:names[2],data:pick(t.diff)} ],
    xaxis:{ categories:pick(t.dates), tickAmount:10, labels:{ rotate:-45, style:{fontSize:'11px'} } }
  });
  if (trendChart) trendChart.destroy();
  trendChart = new ApexCharts(document.getElementById('trendChart'), tOpts); trendChart.render();
}
areaSel.onchange = render; dtSel.onchange = render; render();
</script>
</body>
</html>
